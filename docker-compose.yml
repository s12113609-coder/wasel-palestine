version: '3.9'

services:
  app:
    build: .
    container_name: wasel_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=wasel_db
      - DB_USER=wasel_user
      - DB_PASSWORD=wasel_pass_2026
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-wasel_jwt_secret_super_secure_2026}
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=7d
      - OPENROUTESERVICE_API_KEY=${OPENROUTESERVICE_API_KEY:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wasel_net

  postgres:
    image: postgres:16-alpine
    container_name: wasel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wasel_db
      POSTGRES_USER: wasel_user
      POSTGRES_PASSWORD: wasel_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasel_user -d wasel_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wasel_net

  redis:
    image: redis:7-alpine
    container_name: wasel_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - wasel_net

volumes:
  postgres_data:
  redis_data:

networks:
  wasel_net:
    driver: bridge
